services:
  - type: web
    name: pa-prior-auth-mcp-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: FHIR_SERVER_URL
        value: https://hapi.fhir.org/baseR4
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
